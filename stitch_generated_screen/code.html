<style data-purpose="layout-styles">
    body {
      background-color: #000000;
      color: #ffffff;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* Mercury-like fluid animation container */
    .fluid-container {
      position: relative;
      width: 100%;
      height: 120px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(10, 10, 10, 0.8);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.05);
    }

    /* Razor-thin glowing edge */
    .glow-border {
      position: absolute;
      inset: -1px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      pointer-events: none;
      z-index: 10;
    }
  </style>
<style data-purpose="mercury-fluid-effect">
    /* Mercury/Liquid Light effect using CSS and SVG filters */
    .mercury-substance {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 70%;
      background: linear-gradient(180deg, #ffffff 0%, #a1a1a1 20%, #404040 50%, #000000 100%);
      filter: url(#gooey);
      opacity: 0.9;
    }

    /* Sharp white highlights on the fluid */
    .highlight-streak {
      position: absolute;
      top: 10%;
      left: 0;
      width: 100%;
      height: 4px;
      background: white;
      filter: blur(2px);
      box-shadow: 0 0 10px white;
      opacity: 0.7;
    }

    @keyframes wave {
      0% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-25%) translateY(5px); }
      100% { transform: translateX(-50%) translateY(0); }
    }

    .animate-wave {
      animation: wave 8s ease-in-out infinite;
    }
  </style>
</head>

<!-- Script for minor value fluctuations to simulate live data -->
<script data-purpose="ui-simulations">
    const freqEl = document.getElementById('freq-val');
    const dbEl = document.getElementById('db-val');

    function updateTelemetry() {
      // Randomize slightly around the target values
      const freq = 140 + Math.floor(Math.random() * 15);
      const db = -7 - Math.floor(Math.random() * 5);
      
      freqEl.innerText = freq;
      dbEl.innerText = db;
    }

    setInterval(updateTelemetry, 150);
